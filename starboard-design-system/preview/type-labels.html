<!-- @dsCard group="Type" -->
<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 22px 26px; width: 700px; height: 260px; gap: 14px; justify-content: center; }
  .block { display: flex; flex-direction: column; gap: 6px; }
  .row-l { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .lab {
    font-family: var(--font-family-chivo);
    font-weight: 700; text-transform: uppercase;
    color: var(--text-color);
    display: inline-block;
  }
  .lab.sm { font-size: 8.5px; letter-spacing: 0.40em; color: var(--text-muted); }
  .lab.md { font-size: 10px;  letter-spacing: 0.22em; }
  .lab.lg { font-size: 13px;  letter-spacing: 0.22em; }
  .tooltip {
    font-family: var(--font-family-chivo);
    font-size: 9px; letter-spacing: 0.20em; font-weight: 700;
    text-transform: uppercase; color: var(--text-color);
    padding: 4px 8px; border-radius: 4px;
    border: 1px solid var(--border-medium);
    background: var(--card-bg-glass);
    display: inline-block;
  }
  .badge {
    display: inline-flex; gap: 7px; align-items: center;
    border: 1px solid var(--border-medium); border-radius: 6px;
    padding: 5px 10px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-color); }
  .badge span {
    font-family: var(--font-family-chivo);
    font-size: 8.5px; letter-spacing: 0.18em; font-weight: 700;
    text-transform: uppercase; color: var(--text-color);
  }
  .accent-lab {
    font-family: var(--font-family-chivo);
    font-size: 10px; letter-spacing: 0.22em; font-weight: 700;
    text-transform: uppercase; color: var(--accent-text);
    padding: 4px 9px; border-radius: 4px;
    background: color-mix(in srgb, var(--accent-color) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent-color) 30%, transparent);
  }
</style>
</head>
<body>
  <div class="block">
    <span class="label">Eyebrow · section header</span>
    <span class="lab lg">PLANS</span>
  </div>
  <div class="block">
    <span class="label">Section · micro · tooltip</span>
    <div class="row-l">
      <span class="lab md">VISION BOARDS</span>
      <span class="lab sm">AFFIRMATION</span>
      <span class="tooltip">Library</span>
    </div>
  </div>
  <div class="block">
    <span class="label">Accent / status labels · uses accent-color</span>
    <div class="row-l">
      <span class="accent-lab">NEW</span>
      <span class="badge"><span class="dot"></span><span>Onboarding · 60%</span></span>
      <span class="badge"><span class="dot"></span><span>Pro</span></span>
    </div>
  </div>
</body>
</html>
