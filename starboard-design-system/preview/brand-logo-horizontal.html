<!-- @dsCard group="Brand" -->
<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 0; width: 700px; height: 220px; justify-content: center; align-items: center; background: var(--bg-color); position: relative; overflow: hidden; }
  body::before {
    content: ""; position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 0% 0%, rgba(0,0,0,0.15) 0%, transparent 50%),
      radial-gradient(circle at 100% 100%, rgba(0,0,0,0.10) 0%, transparent 50%);
    pointer-events: none;
  }
  .logo { width: 380px; position: relative; z-index: 1; }
</style>
</head>
<body>
  <img class="logo" src="../assets/logos/sb-dark-lockup-horizontal.webp" alt="Starboard horizontal lockup" />
</body>
</html>
