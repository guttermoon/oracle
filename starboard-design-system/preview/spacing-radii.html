<!-- @dsCard group="Spacing" -->
<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 22px 26px; width: 700px; height: 210px; gap: 12px; }
  .row-r { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; flex: 1; align-items: center; }
  .demo {
    background: var(--card-bg-glass);
    border: 1px solid var(--card-border);
    height: 96px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px;
    padding: 8px;
  }
  .nm { font-family: var(--font-family-chivo); font-size: 11px; color: var(--text-color); font-weight: 600; }
  .px { font-family: ui-monospace, Menlo, monospace; font-size: 9.5px; color: var(--text-muted); }
  .use { font-family: var(--font-family-chivo); font-size: 9.5px; color: var(--text-muted); text-align: center; line-height: 1.3; }
</style>
</head>
<body>
  <span class="label">Corner radii · sm / md / lg from globals.css + pill modifier</span>
  <div class="row-r">
    <div class="demo" style="border-radius:4px">
      <div class="nm">sm · 4px</div>
      <div class="use">chips, micro</div>
    </div>
    <div class="demo" style="border-radius:8px">
      <div class="nm">md · 8px</div>
      <div class="use">buttons, inputs, default</div>
    </div>
    <div class="demo" style="border-radius:12px">
      <div class="nm">lg · 12px</div>
      <div class="use">cards, modals</div>
    </div>
    <div class="demo" style="border-radius:9999px">
      <div class="nm">pill</div>
      <div class="use">segmented toggles, dock</div>
    </div>
  </div>
</body>
</html>
