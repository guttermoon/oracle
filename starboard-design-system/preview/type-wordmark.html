<!-- @dsCard group="Type" -->
<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 26px 28px; width: 700px; height: 240px; gap: 14px; }
  .wordmark {
    font-family: var(--font-family-reality);
    font-size: 88px; line-height: 0.9;
    color: var(--text-color);
    letter-spacing: 0.02em;
    text-align: center;
  }
  .meta { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
  .meta-l { display: flex; flex-direction: column; gap: 4px; }
  .name { font-family: var(--font-family-chivo); font-size: 13px; color: var(--text-color); }
</style>
</head>
<body>
  <span class="label">Logo wordmark · Reality Stone</span>
  <div class="wordmark">starboard</div>
  <div class="meta">
    <div class="meta-l">
      <div class="name">Reality Stone · 400 (single weight)</div>
      <div class="mono">font-family: var(--font-family-reality);</div>
    </div>
    <div class="mono">drives every SB lockup</div>
  </div>
</body>
</html>
