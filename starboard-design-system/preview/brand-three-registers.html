<!doctype html>
<html data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 0; width: 700px; height: 280px; background: var(--bg-color); flex-direction: row; gap: 0; }
  .col {
    flex: 1;
    display: flex; flex-direction: column;
    padding: 22px 18px;
    gap: 10px;
    border-right: 1px solid rgba(4,4,28,0.06);
  }
  .col:last-child { border-right: 0; }
  .col.dark   { background: #04041C; color: #F5E6CD; }
  .col.warm   { background: #F7F0DB; color: #6A4D44; }
  .col.paper  { background: #FAF6EC; color: #04041C; }
  .head {
    font-family: var(--font-family-chivo);
    font-size: 9px; letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.55;
  }
  .name {
    font-family: var(--font-family-secondary);
    font-style: italic; font-size: 19px;
    margin-bottom: 4px;
  }
  .mark {
    flex: 1;
    width: 100%;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .mark img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .note {
    font-family: var(--font-family-chivo);
    font-size: 9.5px;
    line-height: 1.5;
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="col dark">
    <span class="head">REGISTER 01 · DETAILED</span>
    <div class="name">Inked elements</div>
    <div class="mark"><img src="../assets/elements/dark/lighthouse.webp" /></div>
    <p class="note">App chrome, marketing decoration. 22 cream-on-navy WebPs.</p>
  </div>
  <div class="col paper">
    <span class="head">REGISTER 02 · PARED-BACK</span>
    <div class="name">Board art</div>
    <div class="mark"><img src="../assets/board-art/lighthouse.png" /></div>
    <p class="note">Vision boards, high-impact marketing. Art-nouveau frames.</p>
  </div>
  <div class="col warm">
    <span class="head">REGISTER 03 · MUTED</span>
    <div class="name">Oracle flash</div>
    <div class="mark"><img src="../assets/oracle/swallows.png" /></div>
    <p class="note">Blog, newsletter, editorial. Sailor-jerry style.</p>
  </div>
</body>
</html>
