<!-- @dsCard group="Brand" -->
<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--bg-color); }
  body {
    padding: 0; width: 700px; height: 220px;
    background-color: var(--bg-color);
    background-image:
      radial-gradient(circle at 50% 50%, transparent 60%, rgba(0,0,0,0.05) 100%),
      radial-gradient(circle at 0% 0%, rgba(0,0,0,0.12) 0%, transparent 35%),
      radial-gradient(circle at 100% 0%, rgba(0,0,0,0.12) 0%, transparent 35%),
      radial-gradient(circle at 100% 100%, rgba(0,0,0,0.12) 0%, transparent 35%),
      radial-gradient(circle at 0% 100%, rgba(0,0,0,0.12) 0%, transparent 35%),
      url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.10'/%3E%3C/svg%3E");
    background-attachment: fixed;
    align-items: center; justify-content: center;
    position: relative;
  }
  .inner {
    text-align: center; padding: 24px 32px;
    position: relative;
  }
  h2 {
    font-family: var(--font-family-secondary);
    font-style: italic; font-weight: 400;
    color: var(--text-color);
    font-size: 38px; line-height: 1.1;
    letter-spacing: 0.01em;
  }
  p {
    font-family: var(--font-family-chivo);
    color: var(--text-muted);
    font-size: 12px; margin-top: 10px;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <div class="inner">
    <h2>Aged parchment background</h2>
    <p>Vignette · corner foxing · fractal noise · fixed attachment</p>
  </div>
</body>
</html>
