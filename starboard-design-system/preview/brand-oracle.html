<!-- @dsCard group="Brand" -->
<!doctype html>
<html data-theme="warm">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 18px 22px; width: 700px; height: 360px; background: var(--bg-color); }
  .grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 10px;
    height: 100%;
  }
  .slot {
    display: flex; flex-direction: column;
    gap: 6px; align-items: center;
  }
  .img-wrap {
    width: 100%; flex: 1;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-color);
  }
  .img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .cap {
    font-family: var(--font-family-chivo);
    font-size: 8.5px; letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: center;
  }
</style>
</head>
<body>
  <span class="label">Oracle illustrations · blog & newsletter style · 16 stills + 1 animated flash</span>
  <div class="grid">
    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/anchor.png" /></div><div class="cap">Anchor</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/swallows.png" /></div><div class="cap">Swallows</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/nautical-star.png" /></div><div class="cap">Star</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/hold-fast.png" /></div><div class="cap">Hold fast</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/hearts.png" /></div><div class="cap">Hearts</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/skull.png" /></div><div class="cap">Skull</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/dagger.png" /></div><div class="cap">Dagger</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/cannons.png" /></div><div class="cap">Cannons</div></div>

    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/hula-girl.png" /></div><div class="cap">Hula girl</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/mermaid.png" /></div><div class="cap">Mermaid</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/parrot.png" /></div><div class="cap">Parrot</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/shark.png" /></div><div class="cap">Shark</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/turtle.png" /></div><div class="cap">Turtle</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/tiger.png" /></div><div class="cap">Tiger</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/golden-dragon.png" /></div><div class="cap">Dragon</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/pig-and-rooster.png" /></div><div class="cap">Pig & rooster</div></div>
  </div>
</body>
</html>
