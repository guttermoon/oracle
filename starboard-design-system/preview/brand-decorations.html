<!-- @dsCard group="Brand" -->
<!doctype html>
<html data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 18px 22px; width: 700px; height: 320px; background: var(--bg-color); gap: 12px; }
  .grid {
    display: grid;
    grid-template-columns: 1.4fr 1.2fr 1fr 0.9fr 0.9fr;
    grid-template-rows: 1fr 1fr;
    gap: 12px;
    flex: 1;
  }
  .slot { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .img-wrap {
    width: 100%; flex: 1;
    display: flex; align-items: center; justify-content: center;
    background: #FAF6EC;
    border: 1px solid rgba(4,4,28,0.06);
    border-radius: 8px;
    padding: 10px;
    overflow: hidden;
  }
  .img-wrap.tile { padding: 0; }
  .img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .img-wrap.tile img { width: 100%; height: 100%; object-fit: cover; }
  .cap {
    font-family: var(--font-family-chivo);
    font-size: 8.5px; letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: center;
  }
  .wide { grid-column: span 2; }
</style>
</head>
<body>
  <span class="label">Decorations · star plays, frames, dividers, moon · use as ornament, never as a logomark</span>
  <div class="grid">
    <div class="slot wide"><div class="img-wrap"><img src="../assets/decorations/sb-banner-frame.svg" /></div><div class="cap">Banner frame</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/decorations/sb-frame-half.png" /></div><div class="cap">Half frame</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/decorations/sb-frame-corner.svg" /></div><div class="cap">Corner</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/decorations/sb-frame-banner.png" /></div><div class="cap">Frame banner</div></div>

    <div class="slot wide"><div class="img-wrap"><img src="../assets/decorations/sb-divider.svg" /></div><div class="cap">Divider</div></div>
    <div class="slot"><div class="img-wrap tile"><img src="../assets/decorations/sb-star-pattern-1.png" /></div><div class="cap">Star tile A</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/decorations/sb-star-flourish.png" /></div><div class="cap">Flourish</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/decorations/moon-frame-2.svg" /></div><div class="cap">Moon frame</div></div>
  </div>
</body>
</html>
