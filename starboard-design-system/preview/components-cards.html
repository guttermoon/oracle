<!-- @dsCard group="Components" -->
<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 22px 26px; width: 700px; height: 220px; gap: 14px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; flex: 1; }
  .card {
    background: var(--card-bg-glass);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    box-shadow: var(--card-shadow);
    padding: 18px;
    display: flex; flex-direction: column; gap: 8px;
    position: relative;
    overflow: hidden;
  }
  .card.hi { border-color: var(--card-border-highlighted); }
  .ttl {
    font-family: var(--font-family-secondary);
    font-style: italic; font-weight: 400;
    font-size: 22px; color: var(--text-color);
  }
  .bd {
    font-family: var(--font-family-chivo);
    font-size: 12px; color: var(--text-muted); line-height: 1.5;
  }
  .badge {
    font-family: var(--font-family-chivo);
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent-text);
    padding: 3px 8px; border-radius: 4px;
    background: rgba(163,230,53,0.10);
    border: 1px solid rgba(163,230,53,0.30);
    align-self: flex-start;
  }
</style>
</head>
<body>
  <span class="label">Card surfaces · resting · highlighted variant</span>
  <div class="grid">
    <div class="card">
      <div class="ttl">Career board</div>
      <div class="bd">Roles, screenshots, and quotes that point toward the next chapter.</div>
      <div class="badge">12 images</div>
    </div>
    <div class="card hi">
      <div class="ttl">Health & rest</div>
      <div class="bd">A daily reminder lives here. Soft, consistent — the inner compass.</div>
      <div class="badge">Highlighted</div>
    </div>
  </div>
</body>
</html>
