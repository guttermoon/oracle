<!-- @dsCard group="Components" -->
<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 0; width: 700px; height: 100px; background: var(--bg-color); justify-content: center; }
  .hdr {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    background: var(--nav-bg);
    padding: 14px 20px;
    height: 64px;
  }
  .left { display: flex; align-items: center; gap: 18px; }
  .left a {
    display: inline-flex; padding: 8px;
    color: var(--text-color); opacity: 0.5;
    transition: opacity 200ms;
  }
  .left a.on { opacity: 1; color: var(--accent-color); }
  .left a:hover { opacity: 1; }
  .left a i, .left a svg { width: 20px; height: 20px; }
  .logo { display: flex; align-items: center; height: 32px; }
  .logo img { height: 100%; }
  .right { display: flex; align-items: center; justify-content: flex-end; gap: 14px; }
  .badge {
    display: inline-flex; gap: 6px; align-items: center;
    border: 1px solid var(--border-medium); border-radius: 6px;
    padding: 5px 10px;
  }
  .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-color); }
  .badge span {
    font-family: var(--font-family-chivo);
    font-size: 9px; letter-spacing: 0.18em; font-weight: 700;
    text-transform: uppercase; color: var(--text-color);
  }
  .ac { color: var(--text-color); opacity: 0.6; display: inline-flex; align-items: center; gap: 6px; }
  .ac span { font-family: var(--font-family-chivo); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700; opacity: 0.6; }
  .ac i, .ac svg { width: 16px; height: 16px; }
</style>
</head>
<body>
  <header class="hdr">
    <div class="left">
      <a class="on" aria-label="Boards"><i data-lucide="image"></i></a>
      <a aria-label="Library"><i data-lucide="library"></i></a>
      <a aria-label="Notifications"><i data-lucide="bell"></i></a>
      <a aria-label="Moon"><i data-lucide="moon-star"></i></a>
    </div>
    <div class="logo"><img src="../assets/logos/sb-dark-lockup-horizontal.webp" /></div>
    <div class="right">
      <div class="badge"><span class="dot"></span><span>Onboarding · 60%</span></div>
      <div class="ac"><span>Sam</span><i data-lucide="user"></i></div>
    </div>
  </header>
  <script>lucide.createIcons();</script>
</body>
</html>
