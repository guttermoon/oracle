<!-- @dsCard group="Brand" -->
<!doctype html>
<html data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 22px 26px; width: 700px; height: 340px; background: var(--bg-color); gap: 12px; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 14px;
    flex: 1;
  }
  .slot {
    display: flex; flex-direction: column;
    gap: 6px; align-items: center;
  }
  .img-wrap {
    width: 100%; flex: 1;
    display: flex; align-items: center; justify-content: center;
    background: #FAF6EC;
    border: 1px solid rgba(4,4,28,0.06);
    border-radius: 8px;
    padding: 14px;
    overflow: hidden;
  }
  .img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .cap {
    font-family: var(--font-family-chivo);
    font-size: 9px; letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: center;
  }
</style>
</head>
<body>
  <span class="label">Vision board art · pared-back register · art-nouveau frames · for boards & high-impact marketing</span>
  <div class="grid">
    <div class="slot"><div class="img-wrap"><img src="../assets/board-art/lighthouse.png" /></div><div class="cap">Lighthouse</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/board-art/orange-tree.png" /></div><div class="cap">Orange tree</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/board-art/throne.png" /></div><div class="cap">Throne</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/board-art/magpie.png" /></div><div class="cap">Magpie</div></div>

    <div class="slot"><div class="img-wrap"><img src="../assets/board-art/stag.png" /></div><div class="cap">Stag</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/board-art/horseshoe.png" /></div><div class="cap">Horseshoe</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/board-art/cornucopia.png" /></div><div class="cap">Cornucopia</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/board-art/crown.png" /></div><div class="cap">Crown</div></div>
  </div>
</body>
</html>
