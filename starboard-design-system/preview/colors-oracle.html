<!-- @dsCard group="Colors" -->
<!doctype html>
<html data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 18px 22px; width: 700px; height: 210px; gap: 12px; background: #EDE6D3; }
  .label { color: rgba(31,34,53,0.55); }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; flex: 1; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { flex: 1; border-radius: 8px; border: 1px solid rgba(31,34,53,0.12); min-height: 86px; }
  .nm { font-family: var(--font-family-chivo); font-size: 10px; color: #1F2235; font-weight: 500; }
  .hx { font-family: ui-monospace, Menlo, monospace; font-size: 9.5px; color: rgba(31,34,53,0.55); text-transform: uppercase; }
</style>
</head>
<template id="__bundler_thumbnail" data-bg-color="#EDE6D3">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#EDE6D3"/>
      <rect x="120" y="300" width="130" height="200" rx="14" fill="#1A1B2A"/>
      <rect x="270" y="300" width="130" height="200" rx="14" fill="#3D3E52"/>
      <rect x="420" y="300" width="130" height="200" rx="14" fill="#A83A3A"/>
      <rect x="570" y="300" width="130" height="200" rx="14" fill="#6E7A52"/>
      <rect x="720" y="300" width="130" height="200" rx="14" fill="#D9C9A3"/>
      <rect x="870" y="300" width="130" height="200" rx="14" fill="#C9A84C"/>
    </svg>
  </template>
  <span class="label">Oracle palette · register 03 · sampled from editorial scenes · blog & newsletter only</span>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#EDE6D3"></div><div class="nm">parchment</div><div class="hx">#EDE6D3</div></div>
    <div class="sw"><div class="chip" style="background:#1A1B2A"></div><div class="nm">night ink</div><div class="hx">#1A1B2A</div></div>
    <div class="sw"><div class="chip" style="background:#3D3E52"></div><div class="nm">slate</div><div class="hx">#3D3E52</div></div>
    <div class="sw"><div class="chip" style="background:#A83A3A"></div><div class="nm">strawberry</div><div class="hx">#A83A3A</div></div>
    <div class="sw"><div class="chip" style="background:#6E7A52"></div><div class="nm">leaf sage</div><div class="hx">#6E7A52</div></div>
    <div class="sw"><div class="chip" style="background:#D9C9A3"></div><div class="nm">bloom cream</div><div class="hx">#D9C9A3</div></div>
    <div class="sw"><div class="chip" style="background:#C9A84C"></div><div class="nm">soft gold</div><div class="hx">#C9A84C</div></div>
  </div>
</body>
</html>
