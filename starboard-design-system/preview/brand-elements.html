<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 18px 22px; width: 700px; height: 320px; background: var(--bg-color); }
  .grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 14px 18px;
    height: 100%;
    align-content: center;
  }
  .slot {
    display: flex; flex-direction: column;
    gap: 8px; align-items: center;
  }
  .img-wrap {
    width: 72px; height: 72px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.85;
  }
  .img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .cap {
    font-family: var(--font-family-chivo);
    font-size: 8.5px; letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: center;
  }
</style>
</head>
<body>
  <span class="label">Decorative elements · dark variant · 21 webp</span>
  <div class="grid">
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/anchor.webp" /></div><div class="cap">Anchor</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/compass-rose.webp" /></div><div class="cap">Compass</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/lighthouse.webp" /></div><div class="cap">Lighthouse</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/ship.webp" /></div><div class="cap">Ship</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/shell.webp" /></div><div class="cap">Shell</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/conch.webp" /></div><div class="cap">Conch</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/fish.webp" /></div><div class="cap">Fish</div></div>

    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/crow.webp" /></div><div class="cap">Crow</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/crow-sm.webp" /></div><div class="cap">Crow sm</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/crow-on-branch.webp" /></div><div class="cap">Branch</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/swallows.webp" /></div><div class="cap">Swallows</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/snakes.webp" /></div><div class="cap">Snakes</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/hearts.webp" /></div><div class="cap">Hearts</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/heart.webp" /></div><div class="cap">Heart</div></div>

    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/eye-1.webp" /></div><div class="cap">Eye 1</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/eye-2.webp" /></div><div class="cap">Eye 2</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/sun.webp" /></div><div class="cap">Sun</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/key.webp" /></div><div class="cap">Key</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/crown.webp" /></div><div class="cap">Crown</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/elements/dark/coins.webp" /></div><div class="cap">Coins</div></div>

  </div>
</body>
</html>
