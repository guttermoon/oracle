<!-- @dsCard group="Type" -->
<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 22px 26px; width: 700px; height: 230px; justify-content: space-between; }
  .specimen {
    font-family: var(--font-family-secondary);
    font-style: italic; font-weight: 400;
    color: var(--text-color);
    font-size: 64px; line-height: 1.05;
    letter-spacing: 0.01em;
  }
  .meta {
    display: flex; justify-content: space-between;
    align-items: flex-end;
  }
  .meta-l { display: flex; flex-direction: column; gap: 4px; }
  .name {
    font-family: var(--font-family-chivo);
    font-size: 13px; color: var(--text-color);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <span class="label">Display · headings</span>
  <div class="specimen">Set your course.</div>
  <div class="meta">
    <div class="meta-l">
      <div class="name">Playfair Display · Italic · 400</div>
      <div class="mono">font-family: var(--font-family-secondary);</div>
    </div>
    <div class="mono">h1 · 44 / 72px</div>
  </div>
</body>
</html>
