<!-- @dsCard group="Colors" -->
<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 18px 22px; width: 700px; height: 180px; gap: 12px; }
  .row-s { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; flex: 1; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip {
    flex: 1; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
    min-height: 76px;
  }
  .nm {
    font-family: var(--font-family-chivo);
    font-size: 10px; color: var(--text-color);
    letter-spacing: 0.02em;
  }
  .hx {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 9.5px; color: var(--text-muted);
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <span class="label">Dark theme · default</span>
  <div class="row-s">
    <div class="sw"><div class="chip" style="background:#1B1F3B"></div><div class="nm">bg</div><div class="hx">#1B1F3B</div></div>
    <div class="sw"><div class="chip" style="background:#F5E6CD"></div><div class="nm">text · cream</div><div class="hx">#F5E6CD</div></div>
    <div class="sw"><div class="chip" style="background:#A4E636"></div><div class="nm">accent · lime</div><div class="hx">#A4E636</div></div>
    <div class="sw"><div class="chip" style="background:#4D5198"></div><div class="nm">ticker</div><div class="hx">#4D5198</div></div>
    <div class="sw"><div class="chip" style="background:#2D3268"></div><div class="nm">card</div><div class="hx">#2D3268</div></div>
    <div class="sw"><div class="chip" style="background:#04041C"></div><div class="nm">footer</div><div class="hx">#04041C</div></div>
  </div>
</body>
</html>
