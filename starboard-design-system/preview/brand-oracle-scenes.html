<!-- @dsCard group="Brand" -->
<!doctype html>
<html data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 18px 22px; width: 700px; height: 320px; background: var(--bg-color); gap: 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; flex: 1; }
  .slot { display: flex; flex-direction: column; gap: 6px; }
  .img-wrap {
    width: 100%; flex: 1;
    display: flex; align-items: center; justify-content: center;
    background: #1F2235;
    border: 1px solid rgba(4,4,28,0.10);
    border-radius: 8px;
    overflow: hidden;
  }
  .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .cap {
    font-family: var(--font-family-chivo);
    font-size: 8.5px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--text-muted);
    text-align: center;
  }
</style>
</head>
<body>
  <span class="label">Oracle editorial scenes · register 03 · framed full-bleed illustrations for blog & newsletter heroes</span>
  <div class="grid">
    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/starboard-banner-scene.png" /></div><div class="cap">Voyage frame · banner / hero</div></div>
    <div class="slot"><div class="img-wrap"><img src="../assets/oracle/strawberry-moon.png" /></div><div class="cap">Strawberry moon · seasonal editorial</div></div>
  </div>
</body>
</html>
