<!-- @dsCard group="Type" -->
<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { padding: 22px 26px; width: 700px; height: 230px; gap: 10px; }
  .specimen {
    font-family: var(--font-family-chivo);
    color: var(--text-color);
    font-size: 17px; line-height: 1.55;
    font-weight: 400; max-width: 560px;
  }
  .meta {
    display: flex; justify-content: space-between;
    align-items: flex-end; margin-top: auto;
  }
  .meta-l { display: flex; flex-direction: column; gap: 4px; }
  .name {
    font-family: var(--font-family-chivo);
    font-size: 13px; color: var(--text-color);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <span class="label">Body · UI · forms</span>
  <div class="specimen">Starboard turns scattered inspiration into an organized digital vision board you can return to anytime. Repetition strengthens attention, and attention shapes behavior.</div>
  <div class="meta">
    <div class="meta-l">
      <div class="name">Chivo · 300 · 400 · 500 · 600 · 700</div>
      <div class="mono">font-family: var(--font-family-primary);</div>
    </div>
    <div class="mono">16px / 1.6</div>
  </div>
</body>
</html>
