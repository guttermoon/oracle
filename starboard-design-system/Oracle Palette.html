document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html data-theme=\"light\"><head>\n<meta charset=\"utf-8\">\n<style>/* Shared styles for Design System preview cards.\n   Each card is targeted at 700×~150–400px. Keep them visually tight. */\n/* ============================================================================\n   STARBOARD — Color & Type Foundations\n   ============================================================================\n   Source-of-truth tokens lifted directly from app/globals.css in guttermoon/sb.\n   The product ships THREE themes: dark (default), light, and warm. Switch by\n   setting [data-theme=\"dark|light|warm\"] on a root element.\n\n   Brand fonts (3 only) are loaded from local TTF files in fonts/:\n   - Playfair Display (italic + regular)\n   - Chivo (regular + italic)\n   - Reality Stone (the logo wordmark)\n\n   Vision-board user fonts (Amita, Space Grotesk, Cinzel, Cinzel Decorative,\n   Cormorant Garamond) are NOT brand fonts. They're optional faces the\n   Sailor can pick to style their own boards inside the app. The app loads\n   them on demand, separately from this stylesheet.\n   ============================================================================ */\n\n/* ---------- Brand fonts (local) ------------------------------------------- */\n@font-face {\n  font-family: \"Playfair Display\";\n  src: url(\"7c2bad9f-e245-4eb2-b16a-52c0b5bbc489\") format(\"truetype-variations\"),\n       url(\"f5cf19ff-3611-4bd3-a517-c506f51deca6\") format(\"truetype\");\n  font-weight: 400 900;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Playfair Display\";\n  src: url(\"ec10cda0-54cb-428c-9aaa-a8e6aa9197a7\") format(\"truetype-variations\"),\n       url(\"c7c9f9de-4996-42af-acec-278459c4622d\") format(\"truetype\");\n  font-weight: 400 900;\n  font-style: italic;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"Chivo\";\n  src: url(\"2c6e69a7-8297-41a8-a362-bb91c935297c\") format(\"truetype-variations\");\n  font-weight: 100 900;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Chivo\";\n  src: url(\"091af601-0658-4457-8f45-52344a509829\") format(\"truetype-variations\");\n  font-weight: 100 900;\n  font-style: italic;\n  font-display: swap;\n}\n\n/* Optional brand display — \"Reality Stone\" is the logo wordmark font.\n   It draws the letters of \"STARBOARD\" inside every lockup file. Surface it\n   typographically (deck title slides, badge text, anything that mimics the\n   lockup) via `var(--font-family-reality)`. */\n@font-face {\n  font-family: \"Reality Stone\";\n  src: url(\"ea6805f4-ef05-41c4-8db9-79c9382cd81c\") format(\"truetype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* ---------- Vision-board user fonts -------------------------------------\n   These are NOT brand fonts. Listed here for documentation only.\n   Loaded by the app when a Sailor picks a non-brand face for their\n   board copy. Do not reach for them in brand surfaces (marketing,\n   newsletter, deck, email): Amita, Space Grotesk, Cinzel, Cormorant\n   Garamond, Cinzel Decorative.\n*/\n\n/* ---------- Brand palette (raw values) -------------------------------------\n   Reference the *swatches*, not the role tokens, only when you need to\n   stamp a value outside the theme system (e.g. a marketing screenshot,\n   a brand-locked surface). 99% of the time, prefer the role tokens below. */\n:root {\n  /* Navy family — primary surface for dark mode */\n  --navy-950:        #04041C;  /* deep night, footer, ticker text on light */\n  --navy-900:        #1B1F3B;  /* primary dark bg */\n  --navy-800:        #21264B;  /* dark overlay */\n  --navy-700:        #2D3268;  /* dark card surface */\n  --navy-600:        #4D5198;  /* ticker bg / accent purple */\n  --navy-500:        #8285B6;  /* button-surface hover dark */\n\n  /* Cream / parchment family — primary text on dark, surface on light */\n  --cream-500:       #F5E6CD;  /* dark-mode text & accents */\n  --cream-200:       #FAF9D4;  /* ticker text — pale lemon-cream */\n  --paper-50:        #FEFDF6;  /* light-mode background */\n  --parchment-100:   #F4EFE3;  /* aged paper / pre-hydration fallback */\n  --warm-50:         #F7F0DB;  /* warm-mode background */\n  --warm-100:        #FFF9EB;  /* warm overlay / card */\n  --warm-200:        #F0E8D6;  /* warm dock-pill */\n  --warm-300:        #E9E0C5;  /* warm button-surface */\n  --warm-400:        #D8CBA8;  /* warm button-surface hover */\n\n  /* Accent — lime/olive. Dark uses brighter lime; light/warm shift down */\n  --lime-bright:     #A4E636;  /* dark accent */\n  --lime-olive:      #A3C132;  /* light accent */\n  --olive-deep:      #5C7000;  /* light accent text (high contrast) */\n  --forest:          #4A5D45;  /* warm button bg */\n  --sage:            #8F9E7A;  /* warm accent / tertiary */\n  --sage-deep:       #445535;  /* warm accent text */\n\n  /* Earth — warm mode foreground & terracotta highlight */\n  --umber:           #6A4D44;  /* warm text */\n  --terra:           #D98A5F;  /* warm tertiary highlight */\n  --umber-deep:      #7B5E4F;  /* warm tertiary-3 */\n\n  /* Semantic status — same in every theme */\n  --color-danger:    #DC2626;\n  --color-warning:   #F59E0B;\n  --color-success:   #22C55E;\n\n  /* Type families */\n  --font-family-primary:   \"Chivo\", system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif;\n  --font-family-secondary: \"Playfair Display\", Georgia, serif;\n  --font-family-playfair:  \"Playfair Display\", Georgia, serif;\n  --font-family-chivo:     \"Chivo\", system-ui, sans-serif;\n  --font-family-reality:   \"Reality Stone\", \"Playfair Display\", serif;  /* logo wordmark font — use for any typographic STARBOARD lockup */\n\n  /* Weights */\n  --font-weight-regular: 400;\n  --font-weight-medium:  500;\n  --font-weight-bold:    700;\n\n  /* Type scale (mobile → desktop via @media in semantic block below) */\n  --text-size-xs:   0.75rem;   /* 12px */\n  --text-size-sm:   0.875rem;  /* 14px */\n  --text-size-md:   1rem;      /* 16px */\n  --text-size-lg:   1.25rem;   /* 20px */\n  --text-size-xl:   2rem;      /* 32px */\n  --text-size-xxl:  3rem;      /* 48px */\n\n  /* Radii — Starboard is largely soft-cornered but not pill-y */\n  --radius-sm: 4px;\n  --radius-md: 8px;\n  --radius-lg: 12px;\n  --radius-pill: 9999px;\n\n  /* Motion */\n  --ease-out-expo:   cubic-bezier(0.16, 1, 0.3, 1);\n  --ease-in-out-sine: cubic-bezier(0.37, 0, 0.63, 1);\n  --ease-relume:     cubic-bezier(0.21, 0.47, 0.32, 0.98);\n}\n\n/* ============================================================================\n   THEME ROLE TOKENS\n   Use these everywhere. They swap with [data-theme=\"…\"] so every component\n   reads role names (\"text-color\", \"accent-color\", \"card-bg-glass\") rather\n   than baking in palette values.\n   ============================================================================ */\n\n[data-theme=\"dark\"] {\n  --bg-color:        #1B1F3B;\n  --text-color:      #F5E6CD;\n  --text-muted:      rgba(245, 230, 205, 0.6);\n  --text-subtle:     rgba(245, 230, 205, 0.8);\n  --border-color:    #F5E6CD;\n  --border-muted:    rgba(245, 230, 205, 0.15);\n  --border-subtle:   rgba(245, 230, 205, 0.25);\n  --border-medium:   rgba(245, 230, 205, 0.40);\n  --button-bg:       #A4E636;\n  --button-text:     #1B1F3B;\n  --button-surface:  #2D2D3A;\n  --button-surface-hover: #8285B6;\n  --footer-bg:       #04041C;\n  --footer-text:     #F5E6CD;\n  --ticker-bg:       #4D5198;\n  --ticker-text:     #FAF9D4;\n  --nav-bg:          #1B1F3B;\n  --card-bg-glass:   #2D3268;\n  --card-bg-tint:    rgba(245, 230, 205, 0.08);\n  --card-border:           rgba(245, 230, 205, 0.25);\n  --card-border-highlighted: rgba(163, 230, 53, 0.50);\n  --modal-bg:        #2D3268;\n  --overlay-bg:      #21264B;\n  --tertiary-1:      #4D5198;\n  --tertiary-2:      #04041C;\n  --tertiary-3:      #3B3341;\n  --accent-color:    #A4E636;\n  --accent-foreground: #1B1F3B;\n  --accent-text:     #A4E636;\n  --input-bg:        rgba(0, 0, 0, 0.20);\n  --input-bg-hover:  rgba(0, 0, 0, 0.25);\n  --input-bg-focus:  rgba(0, 0, 0, 0.30);\n  --card-shadow:        0 2px 8px -2px rgba(0,0,0,0.4),  0 1px 2px -1px rgba(0,0,0,0.3);\n  --card-shadow-hover:  0 24px 48px -12px rgba(0,0,0,0.55), 0 4px 12px -2px rgba(0,0,0,0.4);\n  --glow-rgb: 163, 230, 53;\n  color-scheme: dark;\n}\n\n[data-theme=\"light\"] {\n  --bg-color:        #FEFDF6;\n  --text-color:      #04041C;\n  --text-muted:      rgba(4, 4, 28, 0.6);\n  --text-subtle:     rgba(4, 4, 28, 0.8);\n  --border-color:    #04041C;\n  --border-muted:    rgba(4, 4, 28, 0.10);\n  --border-subtle:   rgba(4, 4, 28, 0.20);\n  --border-medium:   rgba(4, 4, 28, 0.30);\n  --button-bg:       #A3C132;\n  --button-text:     #04041C;\n  --button-surface:  #F5F4ED;\n  --button-surface-hover: #EBE9DE;\n  --footer-bg:       #4D5198;\n  --footer-text:     #FEFDF6;\n  --ticker-bg:       #4D5198;\n  --ticker-text:     #FAF9D4;\n  --nav-bg:          #FEFDF6;\n  --card-bg-glass:   #FFFFFF;\n  --card-bg-tint:    rgba(4, 4, 28, 0.04);\n  --card-border:           rgba(4, 4, 28, 0.10);\n  --card-border-highlighted: rgba(4, 4, 28, 0.18);\n  --modal-bg:        #FFFFFF;\n  --overlay-bg:      #FFFFFF;\n  --tertiary-1:      #FAF9D4;\n  --tertiary-2:      #4D5198;\n  --accent-color:    #A3C132;\n  --accent-foreground: #04041C;\n  --accent-text:     #5C7000;\n  --input-bg:        rgba(163, 193, 50, 0.08);\n  --input-bg-hover:  rgba(163, 193, 50, 0.12);\n  --input-bg-focus:  rgba(163, 193, 50, 0.15);\n  --card-shadow:        0 1px 3px 0 rgba(4,4,28,0.08), 0 1px 2px -1px rgba(4,4,28,0.05);\n  --card-shadow-hover:  0 20px 40px -12px rgba(4,4,28,0.2), 0 4px 10px -2px rgba(4,4,28,0.08);\n  --glow-rgb: 163, 193, 50;\n  color-scheme: light;\n}\n\n[data-theme=\"warm\"] {\n  --bg-color:        #F7F0DB;\n  --text-color:      #6A4D44;\n  --text-muted:      rgba(106, 77, 68, 0.6);\n  --text-subtle:     rgba(106, 77, 68, 0.8);\n  --border-color:    #6A4D44;\n  --border-muted:    rgba(106, 77, 68, 0.10);\n  --border-subtle:   rgba(106, 77, 68, 0.20);\n  --border-medium:   rgba(106, 77, 68, 0.30);\n  --button-bg:       #4A5D45;\n  --button-text:     #F7F0DB;\n  --button-surface:  #E9E0C5;\n  --button-surface-hover: #D8CBA8;\n  --footer-bg:       #4A5D45;\n  --footer-text:     #F7F0DB;\n  --ticker-bg:       #8F9E7A;\n  --ticker-text:     #FAF9D4;\n  --nav-bg:          #F7F0DB;\n  --card-bg-glass:   #FFF9EB;\n  --card-bg-tint:    rgba(106, 77, 68, 0.10);\n  --card-border:           rgba(106, 77, 68, 0.15);\n  --card-border-highlighted: rgba(106, 77, 68, 0.25);\n  --modal-bg:        #FFF9EB;\n  --overlay-bg:      #FFF9EB;\n  --tertiary-1:      #8F9E7A;\n  --tertiary-2:      #D98A5F;\n  --tertiary-3:      #7B5E4F;\n  --accent-color:    #8F9E7A;\n  --accent-foreground: #F7F0DB;\n  --accent-text:     #445535;\n  --input-bg:        rgba(106, 77, 68, 0.10);\n  --input-bg-hover:  rgba(106, 77, 68, 0.14);\n  --input-bg-focus:  rgba(106, 77, 68, 0.18);\n  --card-shadow:        0 1px 3px 0 rgba(106,77,68,0.10), 0 1px 2px -1px rgba(106,77,68,0.06);\n  --card-shadow-hover:  0 20px 40px -12px rgba(106,77,68,0.25), 0 4px 10px -2px rgba(106,77,68,0.10);\n  --glow-rgb: 143, 158, 122;\n  color-scheme: light;\n}\n\n/* ============================================================================\n   SEMANTIC TYPOGRAPHY\n   Headings always use Playfair Display in italic — that's the brand voice.\n   Body is Chivo, regular. Same scale as the codebase, with a 768px breakpoint.\n   ============================================================================ */\n\nbody {\n  font-family: var(--font-family-primary);\n  font-weight: var(--font-weight-regular);\n  line-height: 1.6;\n  color: var(--text-color);\n  background-color: var(--bg-color);\n}\n\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-family-secondary);\n  font-style: italic;\n  font-weight: 400;\n  line-height: 1.2;\n  letter-spacing: 0.01em;\n  text-wrap: balance;\n  margin: 0;\n}\n\nh1 { font-size: 2.75rem; }                 /* 44px → 72px */\nh2 { font-size: 2.5rem;  }                 /* 40px → 52px */\nh3 { font-size: 1.4rem;  }                 /* 22px → 31px */\nh4 { font-size: 1.05rem; line-height: 1.3;}/* 17px → 25px */\nh5 { font-size: 1.25rem; line-height: 1.4;}/* 20px → 28px */\nh6 { font-size: 0.9rem;  line-height: 1.4;}/* 14px → 18px */\n\n@media (min-width: 768px) {\n  h1 { font-size: 4.5rem;  }\n  h2 { font-size: 3.25rem; }\n  h3 { font-size: 1.925rem;}\n  h4 { font-size: 1.575rem;}\n  h5 { font-size: 1.75rem; }\n  h6 { font-size: 1.1rem;  }\n}\n\n/* Section eyebrow — small Chivo uppercase, used above hero/section titles */\n.eyebrow {\n  font-family: var(--font-family-chivo);\n  font-weight: 600;\n  font-size: 0.75rem;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--text-color);\n}\n\n/* Body text sizes */\n.text-large { font-size: 1.375rem; line-height: 1.5; }\n.text-medium { font-size: 1.125rem; line-height: 1.5; }\n.text-regular { font-size: 1rem; line-height: 1.5; }\n.text-small { font-size: 0.875rem; line-height: 1.5; }\n.text-extra-small { font-size: 0.75rem; line-height: 1.5; }\n\n/* Display class for the marketing hero — same family, swashed feel */\n.font-display {\n  font-family: var(--font-family-secondary);\n  font-style: italic;\n  font-weight: 400;\n}\n\n/* ============================================================================\n   AGED-PARCHMENT BACKGROUND — the brand's signature page texture\n   Apply to <body> or any full-page surface. Combines a vignette, four\n   corner foxing radials, and an SVG noise layer.\n   ============================================================================ */\n.bg-parchment-texture {\n  background-color: var(--bg-color);\n  background-image:\n    radial-gradient(circle at 50% 50%, transparent 60%, rgba(0,0,0,0.05) 100%),\n    radial-gradient(circle at 0%   0%,   rgba(0,0,0,0.03) 0%, transparent 35%),\n    radial-gradient(circle at 100% 0%,   rgba(0,0,0,0.03) 0%, transparent 35%),\n    radial-gradient(circle at 100% 100%, rgba(0,0,0,0.03) 0%, transparent 35%),\n    radial-gradient(circle at 0%   100%, rgba(0,0,0,0.03) 0%, transparent 35%),\n    url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E\");\n  background-attachment: fixed;\n  background-repeat: repeat;\n}\n\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nhtml, body { height: 100%; }\n\nbody {\n  width: 700px;\n  font-family: var(--font-family-primary);\n  color: var(--text-color);\n  background: var(--bg-color);\n  -webkit-font-smoothing: antialiased;\n  padding: 18px 22px;\n  display: flex;\n  flex-direction: column;\n}\n\n.label {\n  font-family: var(--font-family-chivo);\n  font-size: 9px;\n  font-weight: 600;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--text-muted);\n  display: block;\n  margin-bottom: 6px;\n}\n\n.row { display: flex; align-items: center; gap: 12px; }\n.col { display: flex; flex-direction: column; gap: 4px; }\n\n.mono {\n  font-family: \"SF Mono\", ui-monospace, Menlo, Consolas, monospace;\n  font-size: 10.5px;\n  color: var(--text-muted);\n  letter-spacing: -0.01em;\n}\n<\u002Fstyle>\n<style>\n  body { padding: 18px 22px; width: 700px; height: 210px; gap: 12px; background: #EDE6D3; }\n  .label { color: rgba(31,34,53,0.55); }\n  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; flex: 1; }\n  .sw { display: flex; flex-direction: column; gap: 6px; }\n  .chip { flex: 1; border-radius: 8px; border: 1px solid rgba(31,34,53,0.12); min-height: 86px; }\n  .nm { font-family: var(--font-family-chivo); font-size: 10px; color: #1F2235; font-weight: 500; }\n  .hx { font-family: ui-monospace, Menlo, monospace; font-size: 9.5px; color: rgba(31,34,53,0.55); text-transform: uppercase; }\n<\u002Fstyle>\n<\u002Fhead>\n\n  <body><span class=\"label\">Oracle palette · register 03 · sampled from editorial scenes · blog &amp; newsletter only<\u002Fspan>\n  <div class=\"grid\">\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#EDE6D3\"><\u002Fdiv><div class=\"nm\">parchment<\u002Fdiv><div class=\"hx\">#EDE6D3<\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#1A1B2A\"><\u002Fdiv><div class=\"nm\">night ink<\u002Fdiv><div class=\"hx\">#1A1B2A<\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#3D3E52\"><\u002Fdiv><div class=\"nm\">slate<\u002Fdiv><div class=\"hx\">#3D3E52<\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#A83A3A\"><\u002Fdiv><div class=\"nm\">strawberry<\u002Fdiv><div class=\"hx\">#A83A3A<\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#6E7A52\"><\u002Fdiv><div class=\"nm\">leaf sage<\u002Fdiv><div class=\"hx\">#6E7A52<\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#D9C9A3\"><\u002Fdiv><div class=\"nm\">bloom cream<\u002Fdiv><div class=\"hx\">#D9C9A3<\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#C9A84C\"><\u002Fdiv><div class=\"nm\">soft gold<\u002Fdiv><div class=\"hx\">#C9A84C<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
